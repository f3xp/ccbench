# axbench central configuration.
# Everything tunable lives here so runs are reproducible and auditable.

# ---- Models (pinned, not aliases, so the benchmark is reproducible) ----
models:
  # Agent under test / baseline agent. `opus` alias resolves to the latest Opus
  # (Opus 4.8) at run time; we record the resolved id into each cell.json.
  agent: opus
  agent_effort: high            # --effort for the agent sessions
  # Judges must be pinned to an exact id and run at deterministic settings.
  judge: claude-opus-4-8
  judge_effort: low

# ---- Run shape ----
runs_per_cell: 3                # n runs per (ticket x arm)
arms:
  - axkit-flow                  # Arm A: multi-session handoff
  - baseline                    # Arm B: vanilla single session

# ---- Budgets / guards (hard stops, read from CLI JSON cost field) ----
# ZohoDeskiOS is heavy: pod install + full app build is minutes per cell.
budgets:
  max_cost_usd_per_stage: 8.0
  max_cost_usd_per_run: 40.0
  max_stages: 12                # safety cap on the handoff loop
  stage_timeout_s: 2400         # per fresh-session subprocess (pod install + build)
  baseline_timeout_s: 3600      # single baseline session
  pod_install_timeout_s: 1800
  build_timeout_s: 3600

# ---- iOS toolchain (axkit-playground, SPM project) ----
# NOTE: this target uses Swift Package Manager (remote private packages:
# AXKitCore / AXToolKit / DeskFocas_iOS / Zoho_Desk_KMP / UITestCore), NOT
# CocoaPods, and a single .xcodeproj (no .xcworkspace). The ZohoDeskiOS profile
# is preserved in config/bench.zohodesk.yaml.
ios:
  # All paths relative to the worktree root.
  build_root_rel: native
  # No workspace — build the project directly. Leave blank to select -project.
  workspace_rel: ""
  project_rel: native/axkit-playground.xcodeproj
  app_scheme: axkit-playground
  unit_target: axkit-playgroundTests
  uitest_target: axkit-playgroundUITests
  # SwiftLint standalone config (best-effort path; lint gate skipped if absent).
  swiftlint_config_rel: native/.swiftlint.yml
  # SPM project: no `pod install`. Package resolution runs before build.
  podinstall: false
  # Shared SPM clone cache so worktrees don't each re-clone the private repos.
  spm_cache_rel: .scratch/spm-cache
  # Test injection strategy: "filesystem" for synchronized-group projects
  # (drop files into the test target folder — auto-included), or "xcodeproj"
  # to add references via the ruby xcodeproj gem (classic projects, e.g. Desk).
  test_injection: filesystem
  # Scope the unit-test run to just the hidden acceptance suite so the
  # acceptance pass-rate reflects the ticket's criteria (not the whole target's
  # pre-existing tests). Swift Testing id: "<target>/<SuiteTypeName>".
  unit_test_filter: AxbenchProjectTaskListAcceptance
  # Pinned simulator destination for build+test reproducibility.
  destination: "platform=iOS Simulator,name=iPhone 17,OS=latest"
  simulator_name: "iPhone 17"
  # Ruby env that can load the `xcodeproj` gem (fallback injection for classic
  # projects; not used for this synchronized-group target).
  xcodeproj_gem_home: /opt/homebrew/opt/cocoapods/libexec
  ruby_bin: /opt/homebrew/opt/ruby/bin/ruby

# ---- Sources ----
sources:
  # The app under test. Benchmark worktrees are created off `base_ref`.
  # axkit-playground: an AXKit block app with mock data + a ProjectTaskList
  # feature. The harness never commits or pushes to origin.
  target_repo: /Users/goutham-21963/Developer/axkit-playground
  base_ref: staged-orchestrator
  push_guard: true              # remove origin push URL in every worktree
  # Local, gitignored files that a fresh worktree needs to build (they are not
  # committed, so `git worktree add` won't include them). Copied verbatim from
  # the target repo's working tree into each worktree. Kept out of the agent
  # diff because they stay gitignored inside the worktree.
  seed_local_files:
    - native/Developer.xcconfig
    - native/axkit-playground/Setup/AppConfig.swift
  # axkit-flow checkout that Arm A loads by path. We pin + record its SHA.
  axkit_flow_repo: /Users/goutham-21963/Developer/axkit-flow
  axkit_flow_branch: multi-session-handoff-ios

# ---- Claude Code invocation policy ----
claude:
  bin: claude
  allowed_tools:
    - Read
    - Glob
    - Grep
    - Edit
    - Write
    - "Bash(git:*)"
    - "Bash(xcodebuild:*)"
    - "Bash(swiftlint:*)"
    - "Bash(xcrun:*)"
    - "Bash(mkdir:*)"
    - "Bash(ls:*)"
    - "Bash(cat:*)"
    - TodoWrite
    - Task
  disallowed_tools:
    - WebFetch
    - WebSearch
  permission_mode: bypassPermissions

# ---- Handoff flow definition (the 9 stages under test) ----
# Used to validate advance-correctness and recognise the terminal stage.
handoff:
  stages:
    - research
    - unit-testcase-plan
    - plan
    - subagent-dev
    - refine
    - master-testcase-writer
    - uitest
    - review-guide
    - code-review
  terminal_stage: code-review
  artifact_root: .axkit/features   # under the worktree
